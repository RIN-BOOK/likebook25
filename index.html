<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おすすめ読書ビンゴ</title>
  <style>
    /* 全体デザイン：木目調とコンクリート調の完全な定義 */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
    
    body {
      background-color: #3e2723;
      background-image: 
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(0deg, rgba(0,0,0,0.2) 50%, rgba(255,255,255,0.05) 50%),
        linear-gradient(90deg, #4e342e, #3e2723);
      background-size: 80px 100%, 100% 4px, 100% 100%;
      color: #f8fafc; min-height: 100vh; padding-bottom: 50px;
    }

    header {
      background-color: #71717a;
      background-image: linear-gradient(to bottom, #8e8e93, #636366);
      border-bottom: 3px solid #3a3a3c; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-size: 22px; font-weight: 800; color: #f2f2f7; letter-spacing: 1.5px; }
    .badge { padding: 6px 16px; border-radius: 50px; font-size: 12px; font-weight: bold; background: rgba(0, 0, 0, 0.4); color: #e5e5ea; }

    main { max-width: 600px; margin: 30px auto; padding: 0 15px; display: flex; flex-direction: column; align-items: center; }
    .info-bar { width: 100%; background: rgba(0, 0, 0, 0.5); padding: 12px; border-radius: 10px; font-size: 13px; color: #d1d1d6; text-align: center; margin-bottom: 20px; }
    .ctrl-btns { display: flex; gap: 12px; margin-bottom: 25px; justify-content: center; width: 100%; }
    
    .btn { padding: 12px 24px; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; border: none; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; }
    .btn-indigo { background: #8e24aa; color: white; border-bottom: 3px solid #6a1b9a; }
    .btn-indigo:hover { background: #9c27b0; }
    .btn-rose { background: #c62828; color: white; border-bottom: 3px solid #9e1c1c; }
    .btn-rose:hover { background: #d32f2f; }
    
    .board-container { background: rgba(20, 10, 5, 0.75); border: 2px solid #2d1500; border-radius: 20px; padding: 20px; width: 100%; box-shadow: 0 25px 30px rgba(0, 0, 0, 0.6); }
    .board-title { text-align: center; font-size: 19px; font-weight: bold; color: #d7ccc8; margin-bottom: 18px; letter-spacing: 2px; }
    
    /* 5列の本棚 */
    .tana { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; }
    /* 縦長4:3の本のマス */
    .bako { background: #2e1c0c; border: 1px solid #4e342e; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
    .bako:hover { transform: scale(1.04); transition: 0.2s; }
    
    .bako-img-area { width: 100%; aspect-ratio: 3 / 4; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #1a0f05; position: relative; }
    .bako-img-area img { width: 100%; height: 100%; object-fit: cover; }
    .placeholder { font-size: 11px; color: #8d6e63; font-weight: bold; }
    
    .control-bar { height: 26px; background: #150900; border-top: 1px solid #2d1500; display: flex; justify-content: center; align-items: center; font-size: 9px; font-weight: bold; }
    .status-ok { color: #ffb74d; }
    .status-none { color: #5d4037; }
    
    /* スタンプ */
    .stamp-btn { background: none; border: none; color: #8d6e63; font-weight: bold; font-size: 10px; cursor: pointer; padding: 2px 6px; }
    .stamp-btn.active-o { background: #ffb74d; color: #150900; border-radius: 4px; }
    .stamp-btn.active-x { background: #ff5252; color: white; border-radius: 4px; }
    .overlay-mark { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }
    
    /* ポップアップ */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
    .hidden { display: none !important; }
    .modal-content { background: #3e2723; border: 1px solid #5d4037; border-radius: 16px; width: 100%; max-width: 400px; padding: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
    .modal-title { font-size: 17px; font-weight: bold; margin-bottom: 18px; color: #d7ccc8; border-bottom: 1px solid #5d4037; padding-bottom: 8px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: #b0bec5; font-weight: bold; margin-bottom: 6px; }
    .form-input { width: 100%; background: #1a0f05; border: 1px solid #5d4037; border-radius: 8px; padding: 11px; color: #f8fafc; font-size: 13px; outline: none; }
    .form-input:focus { border-color: #ffb74d; }
    .sample-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-sample { background: #2e1c0c; border: 1px solid #5d4037; color: #d7ccc8; font-size: 11px; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  </style>
  <!-- Lz-String文字圧縮ライブラリ -->
  <script src="https://cloudflare.com"></script>
</head>
<body>

  <!-- ヘッダー (コンクリート調) -->
  <header>
    <div class="logo">おすすめ読書ビンゴ</div>
    <div id="modeBadge" class="badge">制作者モード</div>
  </header>

  <!-- メイン -->
  <main>
    <div class="info-bar">📖 マスをクリックして、表紙画像のネットURLと紹介リンクを設定してください。</div>
    
    <div class="ctrl-btns">
      <button id="btnShare" class="btn btn-indigo">参加用URLを発行</button>
      <button id="btnReset" class="btn btn-rose">盤面リセット</button>
    </div>

    <!-- ビンゴボード外枠 -->
    <div class="board-container">
      <div id="boardTitle" class="board-title">MY BOOK BINGO</div>
      <div id="gridContainer" class="tana"></div>
    </div>
  </main>

  <!-- 編集ポップアップ -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title">本の登録・編集</div>
      
      <div class="form-group">
        <label class="form-label">表紙画像のURL</label>
        <input type="url" id="modalImgUrl" placeholder="https://..." class="form-input">
        <div class="sample-row">
          <button type="button" id="sampleA" class="btn-sample">📚 サンプル本A</button>
          <button type="button" id="sampleB" class="btn-sample">📖 サンプル本B</button>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">詳細リンク先URL（Amazonやレビュー記事など）</label>
        <input type="url" id="modalUrl" placeholder="https://..." class="form-input">
      </div>

      <div class="modal-actions">
        <button id="btnModalCancel" class="btn btn-slate" style="padding:8px 16px; background:#475569; color:#fff;">キャンセル</button>
        <button id="btnModalSave" class="btn btn-indigo" style="padding:8px 16px;">棚に並べる</button>
      </div>
    </div>
  </div>

  <!-- 一体型JavaScriptプログラム -->
  <script>
    let bingoData = Array.from({ length: 25 }, () => ({ img: '', url: '', check: '' }));
    let isParticipantMode = false;
    let currentEditIndex = null;

    const gridContainer = document.getElementById('gridContainer');
    const editModal = document.getElementById('editModal');
    const modalImgUrl = document.getElementById('modalImgUrl');
    const modalUrl = document.getElementById('modalUrl');
    const modeBadge = document.getElementById('modeBadge');
    const boardTitle = document.getElementById('boardTitle');

    function init() {
      const params = new URLSearchParams(window.location.search);
      const dataParam = params.get('p');
      if (dataParam) {
        try {
          const decompressed = LZString.decompressFromEncodedURIComponent(dataParam);
          if (decompressed) {
            bingoData = JSON.parse(decompressed);
            isParticipantMode = true;
            modeBadge.innerText = "参加者プレイモード";
            modeBadge.style.background = "rgba(255, 183, 77, 0.2)";
            modeBadge.style.color = "#ffb74d";
            boardTitle.innerText = "読書ビンゴに挑戦中！";
            document.getElementById('btnShare').classList.add('hidden');
          }
        } catch (e) {
          console.error(e);
        }
      }
      renderBoard();
    }

    function renderBoard() {
      gridContainer.innerHTML = '';
      bingoData.forEach((cell, index) => {
        const box = document.createElement('div');
        box.className = "bako";
        
        const contentArea = document.createElement('div');
        contentArea.className = "bako-img-area";
        
        if (cell.img) {
          const img = document.createElement('img');
          img.src = cell.img;
          contentArea.appendChild(img);
        } else {
          const placeholder = document.createElement('div');
          placeholder.className = "placeholder";
          placeholder.innerText = "BOOK " + (index + 1);
          contentArea.appendChild(placeholder);
        }

        if (isParticipantMode && cell.check) {
          const overlay = document.createElement('div');
          overlay.className = "overlay-mark";
          if (cell.check === 'O') {
            overlay.innerHTML = '<span style="color:#ffb74d; border:3px solid #ffb74d; border-radius:50%; width:36px; height:36px; display:inline-flex; align-items:center; justify-content:center;"></span>';
          } else if (cell.check === 'X') {
            overlay.innerHTML = '<span style="color:#ff5252;">✕</span>';
          }
          contentArea.appendChild(overlay);
        }

        contentArea.addEventListener('click', () => {
          if (!isParticipantMode) {
            currentEditIndex = index;
            modalImgUrl.value = cell.img;
            modalUrl.value = cell.url;
            editModal.classList.remove('hidden');
          } else {
            if (cell.url) window.open(cell.url, '_blank');
